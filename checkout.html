<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hapana Fireworks - Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:#f8f9fa;
    padding-top:80px;
}
.navbar{
    background:#1e1e2f;
}
.checkout-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}
.card-details{
    display:none;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark fixed-top">
<div class="container">
<a class="navbar-brand text-warning fw-bold">Hapana Fireworks</a>
</div>
</nav>

<section class="container mt-5">
<h2 class="text-center mb-4">Checkout</h2>

<!-- 🔙 BACK BUTTON -->
<div class="mb-3">
<button onclick="goBack()" class="btn btn-dark">⬅ Back</button>
</div>

<div class="row">

<!-- LEFT -->
<div class="col-md-7">
<div class="checkout-box">

<form id="checkoutForm">

<h5>Billing Details</h5>

<input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
<input type="text" id="phone" class="form-control mb-3" placeholder="Phone">
<textarea id="address" class="form-control mb-3" placeholder="Address"></textarea>

<hr>

<h5>Payment Method</h5>

<div class="form-check">
<input class="form-check-input" type="radio" name="payment" value="cod" checked onclick="toggleCard(false)">
<label class="form-check-label">Cash on Delivery</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="payment" value="paid" onclick="toggleCard(true)">
<label class="form-check-label">Credit / Debit Card</label>
</div>

<!-- CARD DETAILS -->
<div class="card-details mt-3" id="cardDetails">

<input type="text" id="cardName" class="form-control mb-2" placeholder="Card Holder Name">
<input type="text" id="cardNumber" class="form-control mb-2" placeholder="Card Number">

<div class="row">
<div class="col">
<input type="text" id="expiry" class="form-control mb-2" placeholder="MM/YY">
</div>
<div class="col">
<input type="text" id="cvv" class="form-control mb-2" placeholder="CVV">
</div>
</div>

</div>

<button class="btn btn-warning w-100 mt-4">Place Order</button>

</form>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-5">
<div class="checkout-box" id="summaryBox">
<h5>Order Summary</h5>
</div>
</div>

</div>
</section>

<script>

// 🔙 BACK FUNCTION
function goBack(){
    window.history.back();
}

// SHOW/HIDE CARD
function toggleCard(show){
    document.getElementById("cardDetails").style.display = show ? "block" : "none";
}

// LOAD SUMMARY
function loadCheckout(){

let single = JSON.parse(localStorage.getItem("checkoutItem"));
let all = JSON.parse(localStorage.getItem("checkoutAll"));

let summary = document.getElementById("summaryBox");

let total = 0;
let delivery = 300;
let html = "<h5>Order Summary</h5>";

if(single){

    let t = single.price * single.quantity;
    total = t;

    html += `
    <p>${single.name} x ${single.quantity}</p>
    <p>Price: LKR ${single.price}</p>
    `;

}else if(all){

    all.forEach(item=>{
        let t = item.price * item.quantity;
        total += t;

        html += `
        <p>${item.name} x ${item.quantity} = LKR ${t}</p>
        `;
    });
}

let finalTotal = total + delivery;

html += `
<hr>
<p>Delivery: LKR ${delivery}</p>
<h5>Total: LKR ${finalTotal}</h5>
`;

summary.innerHTML = html;
}

loadCheckout();

// ✅ FORM VALIDATION + SUBMIT
document.getElementById("checkoutForm").addEventListener("submit", function(e){
e.preventDefault();

let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();
let payment = document.querySelector('input[name="payment"]:checked').value;

// 🔴 BASIC VALIDATION
if(name === ""){
    alert("Enter your name");
    return;
}

if(phone === "" || !/^[0-9]{10}$/.test(phone)){
    alert("Enter valid phone number (10 digits)");
    return;
}

if(address === ""){
    alert("Enter your address");
    return;
}

// 🔴 CARD VALIDATION
let cardNumber = "";

if(payment === "paid"){   // ✅ FIXED

    let cardName = document.getElementById("cardName").value.trim();
    cardNumber = document.getElementById("cardNumber").value.trim();
    let expiry = document.getElementById("expiry").value.trim();
    let cvv = document.getElementById("cvv").value.trim();

    if(cardName === ""){
        alert("Enter card holder name");
        return;
    }

    if(!/^[0-9]{16}$/.test(cardNumber)){
        alert("Card number must be 16 digits");
        return;
    }

    if(!/^[0-9]{3}$/.test(cvv)){
        alert("CVV must be 3 digits");
        return;
    }

    if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)){
        alert("Expiry must be MM/YY format");
        return;
    }
}

// PRODUCT
let single = JSON.parse(localStorage.getItem("checkoutItem"));
let product = "";
let qty = 1;

if(single){
    product = single.name;
    qty = single.quantity;
}

// TOTAL
let total = document.querySelector("#summaryBox h5:last-child").innerText.replace("Total: LKR ","");

// SEND DATA
let formData = new FormData();

formData.append("name", name);
formData.append("phone", phone);
formData.append("address", address);
formData.append("product", product);
formData.append("quantity", qty);
formData.append("total", total);
formData.append("payment", payment);
formData.append("card_number", cardNumber);

fetch("place_order.php", {
    method: "POST",
    body: formData
})
.then(res => res.text())
.then(data => {

    if(data == "success"){
        alert("Order Placed Successfully!");

        localStorage.removeItem("checkoutItem");
        localStorage.removeItem("checkoutAll");

        window.location.href="myOrders.php";
    }
    else if(data == "login_required"){
        alert("Please login first!");
        window.location.href="login.html";
    }
    else{
        alert("Error placing order");
    }

});

});

</script>

</body>
</html>
